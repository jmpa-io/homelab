# Configuration file for Ansible.
# https://docs.ansible.com/ansible/latest/reference_appendices/config.html.

[defaults]
inventory = inventory/main.py

# Configure output.
nocows = 1

# Disable retry files.
retry_files_enabled = false

# Configure warnings and errors.
# NOTE: keep deprecation_warnings enabled — hiding them masks upcoming
# breaking changes in collections and Ansible core.
deprecation_warnings = true
system_warnings = true

# Configure SSH timeout, since this setup is using WIFI.
timeout = 30

# Performance optimizations - increase parallelism
forks = 20
# Gather only minimal facts to speed up playbooks
gathering = smart
# Cache facts for 1 hour — 24hr is too long; hardware changes won't be
# reflected until the cache expires.
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_fact_cache
fact_caching_timeout = 3600
# Enable callback plugins for better output
callbacks_enabled = profile_tasks, timer
# Reduce polling interval for async tasks
internal_poll_interval = 0.01

[ssh_connection]
# Enable pipelining for faster execution (requires sudo without tty)
pipelining = true
# Optimize SSH connection reuse
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o ConnectTimeout=30 -o ServerAliveInterval=60
# Use faster SSH transfer method
transfer_method = piped

[diff]

# Always show differences in 'changed' status.
always = true

[inventory]
# Cache inventory for 5 minutes — short enough that SSM changes are
# picked up quickly, long enough to avoid redundant re-runs in the same
# session.
cache = true
cache_plugin = jsonfile
cache_connection = /tmp/ansible_inventory_cache
cache_timeout = 300
