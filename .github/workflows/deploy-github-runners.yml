name: Deploy GitHub Runners

on:
  workflow_dispatch:
    inputs:
      vmid_base:
        description: 'Base VMID for runners'
        required: false
        default: '180'
      hostname_prefix:
        description: 'Hostname prefix'
        required: false
        default: 'github-runner'
      ram:
        description: 'RAM in MB'
        required: false
        default: '4096'
      disk_size:
        description: 'Disk size in GB'
        required: false
        default: '20'
      cpu_cores:
        description: 'CPU cores'
        required: false
        default: '2'

jobs:
  deploy-runners:
    name: Deploy GitHub Actions Runners
    runs-on: [self-hosted, homelab]
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Ansible dependencies
        run: |
          pip install -r inventory/requirements.txt
          ansible-galaxy install -r requirements.yml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate dynamic inventory
        run: |
          cd inventory
          python3 main.py > ../inventory.json

      - name: Deploy GitHub Runners
        run: |
          ansible-playbook services/proxmox-community-scripts/github-runner.yml \
            -i inventory.json \
            -e "runner_vmid_base=${{ inputs.vmid_base }}" \
            -e "runner_hostname_prefix=${{ inputs.hostname_prefix }}" \
            -e "runner_ram=${{ inputs.ram }}" \
            -e "runner_disk_size=${{ inputs.disk_size }}" \
            -e "runner_cpu_cores=${{ inputs.cpu_cores }}" \
            -e "github_repo=${{ github.repository }}" \
            -e "github_token=${{ secrets.GH_RUNNER_TOKEN }}" \
            -v
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'

      - name: Display deployment summary
        run: |
          echo "✅ GitHub Actions Runners deployed successfully!"
          echo "Check status: https://github.com/${{ github.repository }}/settings/actions/runners"
