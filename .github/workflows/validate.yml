name: Validate Infrastructure

on:
  pull_request:
    branches:
      - main
    paths:
      - 'inventory/**'
      - 'roles/**'
      - 'services/**'
      - 'playbooks/**'
      - 'scripts/**'
      - 'playbook.yml'
      - 'requirements.yml'
      - '.yamllint'
      - '.ansible-lint'
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'inventory/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r inventory/requirements.txt ansible-lint yamllint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run structural validation
        # Fails the build on any structural issue — not continue-on-error.
        # Checks: YAML validity, missing templates, broken imports,
        # Python syntax, old group names, pcs_ prefix, no changeme,
        # SSH key not inline, helm_repository kubeconfig, gather_facts.
        run: python3 scripts/validate.py

      - name: Validate Python inventory syntax
        # Belt-and-braces — also caught by validate.py but worth running
        # directly to surface cleaner error messages.
        working-directory: inventory
        run: |
          python3 -m py_compile main.py
          python3 -m py_compile inventory.py service.py ssm.py env.py \
            k8s_services.py k8s_inventory.py homepage_config.py
          python3 -m py_compile instances/*.py

      - name: Run YAML lint
        run: yamllint -c .yamllint roles/ services/ playbooks/

      - name: Run Ansible lint
        # continue-on-error because we rely on community.general and
        # kubernetes.core which may not install cleanly from Galaxy CDN
        # every run. Structural issues are caught by validate.py above.
        run: ansible-lint playbook.yml
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
