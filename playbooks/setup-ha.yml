---
# Playbook to configure Proxmox High Availability
# This playbook sets up HA for your Proxmox cluster

- name: Configure Proxmox High Availability
  hosts: proxmox_hosts
  become: true
  gather_facts: true

  vars:
    # Define HA groups - nodes with higher priority numbers are preferred
    ha_groups:
      - name: preferred_nodes
        nodes: "jmpa-server-1:3,jmpa-server-2:2,jmpa-server-3:1"
        comment: "Prefer server-1, fallback to server-2, then server-3"

    # Define VMs to add to HA
    # Uncomment and customize based on your needs
    ha_vms:
      - vmid: 100  # Proxmox Backup Server
        state: started
        max_restart: 3
        max_relocate: 3
        group: preferred_nodes
      # - vmid: 140  # Prometheus (community script)
      #   state: started
      #   max_restart: 3
      #   max_relocate: 3
      # - vmid: 145  # Grafana (community script)
      #   state: started
      #   max_restart: 3
      #   max_relocate: 3
      # - vmid: 155  # Uptime Kuma
      #   state: started
      #   max_restart: 3
      #   max_relocate: 3

    # Define containers to add to HA
    # NOTE: Containers must be on shared storage (NFS, Ceph, etc.)
    ha_containers:
      - ctid: 5  # Nginx Reverse Proxy
        state: started
        max_restart: 3
        max_relocate: 3
        group: preferred_nodes
      - ctid: 15  # Tailscale Gateway
        state: started
        max_restart: 3
        max_relocate: 3
        group: preferred_nodes
      # - ctid: 40  # Prometheus
      #   state: started
      #   max_restart: 3
      #   max_relocate: 3
      # - ctid: 45  # Grafana
      #   state: started
      #   max_restart: 3
      #   max_relocate: 3

  pre_tasks:
    - name: Display HA setup information
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Proxmox High Availability Setup"
          - "=========================================="
          - "This playbook will:"
          - "  1. Verify cluster configuration"
          - "  2. Install HA packages"
          - "  3. Configure watchdog for fencing"
          - "  4. Create HA groups"
          - "  5. Add VMs/containers to HA"
          - ""
          - "IMPORTANT: Ensure shared storage is configured!"
          - "VMs/containers must be on NFS, Ceph, or iSCSI"
          - "=========================================="
      run_once: true

  tasks:
    - name: Include HA configuration tasks
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/instances/proxmox-hosts/ha/tasks/main.yml"

  post_tasks:
    - name: Display next steps
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "HA Configuration Complete!"
          - "=========================================="
          - ""
          - "Next steps:"
          - "  1. Verify HA status: ha-manager status"
          - "  2. Check cluster quorum: pvecm status"
          - "  3. Test failover by stopping a node"
          - "  4. Monitor HA logs: journalctl -u pve-ha-lrm -f"
          - ""
          - "To add more resources to HA:"
          - "  ha-manager add vm:VMID --state started"
          - "  ha-manager add ct:CTID --state started"
          - ""
          - "To remove from HA:"
          - "  ha-manager remove vm:VMID"
          - "  ha-manager remove ct:CTID"
          - ""
          - "Documentation: instances/proxmox-hosts/ha-setup.md"
          - "=========================================="
      run_once: true
