---
# Default variables for the proxmox-community-script role.
# All variables are prefixed with pcs_ to avoid colliding with play-level
# variables and Ansible built-in facts (e.g. 'hostname', 'bridge').

# Proxmox host to run the script on (defaults to first proxmox host).
pcs_proxmox_host: "{{ groups['proxmox_hosts'][0] if groups['proxmox_hosts'] is defined else 'localhost' }}"

# Script configuration.
pcs_script_url: ""
pcs_script_name: ""

# Container/VM configuration.
pcs_container_id: ""
pcs_hostname: ""
pcs_ram: "2048"
pcs_swap: "512"
pcs_disk_size: "8"
pcs_cpu_cores: "2"
pcs_os_type: "debian"
pcs_os_version: "12"
pcs_bridge: "vmbr0"

# Network configuration.
# Static IP is auto-calculated from VMID and bridge if not set.
pcs_static_ip: ""
pcs_gateway: ""

# Script behaviour.
pcs_verbose: "yes"
pcs_privileged: "no"
pcs_features: "nesting=1"

# Advanced options.
pcs_advanced_options: ""
pcs_ssh_root_password: ""

# Cleanup downloaded script files after execution.
pcs_cleanup_script: true
