---
# Setup Tailscale on Proxmox host with additional host-specific services.

- name: Include shared Tailscale setup tasks
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/tailscale/setup.yml"
  vars:
    tailscale_advertise_routes: "{{ host.bridge.subnet }}/{{ host.bridge.ipv4_cidr }},{{ ansible_host }}/32"
    tailscale_tags: "{{ tailscale_tags | default([]) }}"
    tailscale_enable_optimizer: true

- name: Configure IP forwarding for Tailscale.
  become: true
  ansible.builtin.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { name: 'net.ipv4.ip_forward', value: '1' }
    - { name: 'net.ipv6.conf.all.forwarding', value: '1' }

- name: Add Tailscale nginx reverse proxy routing service.
  become: true
  ansible.builtin.template:
    src: etc/systemd/system/tailscale-nginx-reverse-proxy-routing.service
    dest: /etc/systemd/system/tailscale-nginx-reverse-proxy-routing.service
    owner: root
    group: root
    mode: '0644'
    backup: true

- name: Reload systemd daemon.
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start Tailscale nginx reverse proxy routing service.
  become: true
  ansible.builtin.systemd:
    name: tailscale-nginx-reverse-proxy-routing
    enabled: true
    state: started
