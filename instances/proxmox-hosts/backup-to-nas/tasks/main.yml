---
# Configure Proxmox VE Backup to NAS Volume 3
# This role configures automated backups to NAS storage

- name: Configure Proxmox Backup to NAS
  hosts: proxmox_hosts
  gather_facts: true
  become: true

  vars:
    nas_backup_volume: "volume3"
    nas_backup_path: "/mnt/nfs/{{ hostvars[groups['nas'][0]]['instance_name'] }}/{{ nas_backup_volume }}/proxmox-backups"
    backup_schedule: "daily"
    backup_time: "02:00"
    backup_retention_count: 7
    backup_compression: "zstd"
    backup_mode: "snapshot"

  tasks:
    - name: Ensure NAS backup directory exists
      ansible.builtin.file:
        path: "{{ nas_backup_path }}/{{ inventory_hostname }}"
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Check if backup storage is already configured
      ansible.builtin.shell: |
        pvesm status | grep -q "nas-backup" && echo "exists" || echo "not_found"
      register: backup_storage_check
      changed_when: false

    - name: Add NAS as backup storage in Proxmox
      ansible.builtin.shell: |
        pvesm add dir nas-backup \
          --path {{ nas_backup_path }} \
          --content backup \
          --maxfiles {{ backup_retention_count }} \
          --shared 1
      when: "'not_found' in backup_storage_check.stdout"
      register: storage_add_result

    - name: Create backup schedule for all VMs and containers
      ansible.builtin.shell: |
        pvesh create /cluster/backup --storage nas-backup \
          --schedule "{{ backup_time }}" \
          --dow mon,tue,wed,thu,fri,sat,sun \
          --mode {{ backup_mode }} \
          --compress {{ backup_compression }} \
          --mailnotification failure \
          --all 1 \
          --enabled 1
      when: storage_add_result.changed | default(false)
      register: backup_schedule_result
      failed_when: false

    - name: Display backup configuration
      ansible.builtin.debug:
        msg:
          - "Proxmox backup configured successfully!"
          - "Backup Location: {{ nas_backup_path }}"
          - "Schedule: {{ backup_schedule }} at {{ backup_time }}"
          - "Retention: {{ backup_retention_count }} backups"
          - "Compression: {{ backup_compression }}"
          - "Mode: {{ backup_mode }}"
          - ""
          - "View backups: pvesm list nas-backup"
          - "Manual backup: vzdump <vmid> --storage nas-backup"

    - name: Verify backup storage is accessible
      ansible.builtin.shell: |
        pvesm status | grep nas-backup
      register: storage_status
      changed_when: false

    - name: Show storage status
      ansible.builtin.debug:
        var: storage_status.stdout_lines
