---
# Deploy Homepage dashboard to K3s cluster
- name: Deploy Homepage
  hosts: k3s_masters[0]
  gather_facts: false
  become: true
  vars_files:
    - "{{ playbook_dir }}/vars/main.yml"

  tasks:
    - name: Fail early if homepage secrets are not configured in inventory
      ansible.builtin.fail:
        msg: >
          k8s_services.homepage is not set in the inventory.
          Ensure homepage_config is passed to K8sServices in inventory/main.py
          and that all required SSM parameters are populated.
      when: k8s_services.homepage is not defined or k8s_services.homepage is none

    - name: Create Homepage namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: homepage
            labels:
              name: homepage
        kubeconfig: "{{ k3s_kubeconfig_path }}"

    - name: Create Homepage secret from inventory
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: homepage
            namespace: homepage
            labels:
              app.kubernetes.io/name: homepage
          type: Opaque
          stringData: "{{ k8s_services.homepage.secrets }}"
        kubeconfig: "{{ k3s_kubeconfig_path }}"

    - name: Create Homepage ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: homepage
            namespace: homepage
            labels:
              app.kubernetes.io/name: homepage
          data:
            settings.yaml: "{{ lookup('file', playbook_dir + '/../../k8s/homepage/settings.yaml') }}"
            services.yaml: "{{ lookup('file', playbook_dir + '/../../k8s/homepage/services.yaml') }}"
            widgets.yaml: "{{ lookup('file', playbook_dir + '/../../k8s/homepage/widgets.yaml') }}"
            bookmarks.yaml: |
              - Documentation:
                  - Homelab Docs:
                      - icon: book
                        href: https://github.com/jmpa-io/homelab/tree/main/docs
                  - Kubernetes:
                      - icon: kubernetes
                        href: https://kubernetes.io/docs/
                  - Proxmox:
                      - icon: proxmox
                        href: https://pve.proxmox.com/wiki/Main_Page

              - Media:
                  - Servarr Wiki:
                      - icon: sonarr
                        href: https://wiki.servarr.com/
                  - Jellyfin Docs:
                      - icon: jellyfin
                        href: https://jellyfin.org/docs/
            kubernetes.yaml: |
              mode: cluster
        kubeconfig: "{{ k3s_kubeconfig_path }}"

    - name: Deploy Homepage
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../k8s/homepage/deployment.yml"
        kubeconfig: "{{ k3s_kubeconfig_path }}"

    - name: Wait for Homepage to be ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: homepage
        namespace: homepage
        kubeconfig: "{{ k3s_kubeconfig_path }}"
      register: homepage_status
      until: >
        homepage_status.resources | length > 0 and
        homepage_status.resources[0].status.readyReplicas | default(0) >= 1
      retries: 30
      delay: 10

    - name: Get Homepage LoadBalancer IP
      kubernetes.core.k8s_info:
        kind: Service
        name: homepage
        namespace: homepage
        kubeconfig: "{{ k3s_kubeconfig_path }}"
      register: homepage_service

    - name: Display Homepage information
      ansible.builtin.debug:
        msg:
          - "Homepage deployed successfully!"
          - "URL: http://{{ homepage_service.resources[0].status.loadBalancer.ingress[0].ip | default('Pending') }}"
          - ""
          - "Configured services:"
          - "  - Infrastructure: Proxmox, Pi-hole, Synology NAS"
          - "  - Kubernetes: Dashboard, ArgoCD, Grafana, Prometheus, Loki, Tempo"
          - "  - Media: Jellyfin, Jellyseerr, Tautulli"
          - "  - *arr Suite: Prowlarr, Sonarr, Radarr, Lidarr, Readarr, Bazarr"
          - "  - Download: Deluge"
          - "  - Development: Ollama, n8n, GitHub, VS Code"
          - "  - Internet: MySpeed, Speedtest, Tailscale"
          - ""
          - "Secrets are managed via inventory (SSM Parameter Store)"
          - "To update API keys, modify inventory/homepage_config.py and redeploy"
