---
- name: Setup k3s VMs.
  hosts: proxmox_hosts
  gather_facts: false
  vars:
    proxmox_node_name: "{{ host.name }}"
    # Derive node_id from the bridge IP third octet (e.g. 10.0.4.1 → 4).
    # This is consistent with inventory.py and works correctly for both
    # on-prem servers (10.0.1.x → id=1) and VPS nodes (10.0.4.x → id=4).
    proxmox_node_id: "{{ host.bridge.ipv4.split('.')[2] | int }}"
    proxmox_node_ip: "{{ host.ipv4 }}"
    proxmox_node_bridge_ip: "{{ host.bridge.ipv4 }}"
    proxmox_node_bridge_name: "{{ host.bridge.name }}"
    # ---
    proxmox_api_ip: "{{ proxmox_node_ip }}"
    proxmox_api_token_secret: "{{ proxmox.api_token }}"
    # ---
    vm_password: "{{ ansible_become_pass }}"
    vm_common_tags: [ k3s ]

  tasks:
    - name: Create K3s master(s).
      ansible.builtin.include_role:
        name: "{{ root_playbook_directory }}/roles/create-vm"
      loop: "{{ k3s.masters }}"
      loop_control:
        index_var: i
        loop_var: master_ipv4
      vars:
        create_vm__proxmox_node_name: "{{ proxmox_node_name }}"
        create_vm__proxmox_node_bridge_name: "{{ proxmox_node_bridge_name }}"
        create_vm__proxmox_api_ip: "{{ proxmox_api_ip }}"
        create_vm__proxmox_api_token_secret: "{{ proxmox_api_token_secret }}"
        create_vm__vm_vmid: "{{ proxmox_node_id }}{{ common.k3s.masters_ips_start_range + i }}"
        create_vm__vm_hostname: "k3s-master-{{ proxmox_node_id }}-{{ i + 1 }}"
        create_vm__vm_password: "{{ vm_password }}"
        create_vm__vm_gateway: "{{ proxmox_node_bridge_ip }}"
        create_vm__vm_ip_with_cidr: "{{ master_ipv4 }}/{{ common.subnet.ipv4_cidr }}"
        create_vm__vm_tags: "{{ vm_common_tags + ['master'] }}"
        create_vm__vm_clone_from_vmid: "{{ 10000 + inventory_hostname.split('_')[-1] | int }}"

    - name: Create K3s node(s).
      ansible.builtin.include_role:
        name: "{{ root_playbook_directory }}/roles/create-vm"
      loop: "{{ k3s.nodes }}"
      loop_control:
        index_var: i
        loop_var: node_ipv4
      vars:
        create_vm__proxmox_node_name: "{{ proxmox_node_name }}"
        create_vm__proxmox_node_bridge_name: "{{ proxmox_node_bridge_name }}"
        create_vm__proxmox_api_ip: "{{ proxmox_api_ip }}"
        create_vm__proxmox_api_token_secret: "{{ proxmox_api_token_secret }}"
        create_vm__vm_clone_from_vmid: "{{ 10000 + inventory_hostname.split('_')[-1] | int }}"
        create_vm__vm_vmid: "{{ proxmox_node_id }}{{ common.k3s.nodes_ips_start_range + i }}"
        create_vm__vm_hostname: "k3s-node-{{ proxmox_node_id }}-{{ i + 1 }}"
        create_vm__vm_password: "{{ vm_password }}"
        create_vm__vm_gateway: "{{ proxmox_node_bridge_ip }}"
        create_vm__vm_ip_with_cidr: "{{ node_ipv4 }}/{{ common.subnet.ipv4_cidr }}"
        create_vm__vm_tags: "{{ vm_common_tags + ['node'] }}"

    - name: Ensure old known_hosts are cleared.
      delegate_to: localhost
      run_once: true
      loop: "{{ groups['proxmox_hosts'] | map('extract', hostvars, ['k3s']) | map(attribute='masters') | sum(start=[]) + groups['proxmox_hosts'] | map('extract', hostvars, ['k3s']) | map(attribute='nodes') | sum(start=[]) }}"  # noqa: yaml[line-length]
      loop_control:
        loop_var: ip
      ansible.builtin.known_hosts:
        name: "{{ ip }}"
        state: absent
      ignore_errors: true  # noqa: ignore-errors

    - name: Add known_hosts.
      delegate_to: localhost
      run_once: true
      loop: "{{ groups['proxmox_hosts'] | map('extract', hostvars, ['k3s']) | map(attribute='masters') | sum(start=[]) + groups['proxmox_hosts'] | map('extract', hostvars, ['k3s']) | map(attribute='nodes') | sum(start=[]) }}"  # noqa: yaml[line-length]
      loop_control:
        loop_var: ip
      ansible.builtin.known_hosts:
        name: "{{ ip }}"
        key: "{{ lookup('pipe', 'ssh-keyscan -T 10 ' + ip) }}"
        state: present

    - name: Wait for VMs to be fully ready.
      run_once: true
      ansible.builtin.pause:
        seconds: 30
        prompt: "Waiting for VMs to complete cloud-init..."

# Install k3s on master nodes
- name: Install k3s on first master (cluster init).
  hosts: k3s_masters[0]
  become: true
  vars_files:
    - "{{ playbook_dir }}/vars/main.yml"
  vars:
    # k3s_version comes from k3s_cluster group vars (inventory.py line 213).
    # Prefer that over common.k3s.version so this play works with both the
    # full inventory and the k3s-only filtered one.
    k3s_version: "{{ k3s_version | default(common.k3s.version) }}"
    k3s_server_manifests_urls:
      - url: "https://raw.githubusercontent.com/metallb/metallb/{{ k8s_services.metallb.version }}/config/manifests/metallb-native.yaml"
        filename: metallb.yaml

  tasks:
    - name: Install k3s on first master.  # noqa: command-instead-of-module risky-shell-pipe
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - server \
          --cluster-init \
          {{ k3s_install_options | join(' ') }} \
          --tls-san {{ ansible_host }}
      args:
        creates: /usr/local/bin/k3s
      register: k3s_install_result
      changed_when: k3s_install_result.rc == 0 and k3s_install_result.stdout != ''

    - name: Wait for k3s to be ready (first master).
      ansible.builtin.wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        state: present
        timeout: 120

    - name: Ensure k3s auto-deploy manifests directory exists.
      ansible.builtin.file:
        path: /var/lib/rancher/k3s/server/manifests
        state: directory
        mode: '0700'

    - name: Download server manifests (MetalLB etc.) to k3s auto-deploy dir.
      ansible.builtin.get_url:
        url: "{{ item.url }}"
        dest: "/var/lib/rancher/k3s/server/manifests/{{ item.filename }}"
        mode: '0644'
      loop: "{{ k3s_server_manifests_urls }}"
      when: k3s_server_manifests_urls | length > 0

    - name: Get k3s token.
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_encoded

    - name: Set k3s token fact.
      ansible.builtin.set_fact:
        k3s_token: "{{ k3s_token_encoded.content | b64decode | trim }}"

    - name: Store k3s token for other nodes.
      ansible.builtin.set_fact:
        k3s_cluster_token: "{{ k3s_token }}"
      delegate_to: localhost
      delegate_facts: true

    - name: Get kubeconfig.
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_encoded

    - name: Save kubeconfig locally.
      ansible.builtin.copy:
        content: "{{ kubeconfig_encoded.content | b64decode | regex_replace('127.0.0.1', ansible_host) }}"
        dest: "{{ playbook_dir }}/kubeconfig.yaml"
        mode: '0600'
      delegate_to: localhost

# Install k3s on additional master nodes
- name: Install k3s on additional masters.
  hosts: k3s_masters[1:]
  become: true
  serial: 1
  vars_files:
    - "{{ playbook_dir }}/vars/main.yml"
  vars:
    k3s_version: "{{ k3s_version | default(common.k3s.version) }}"
    k3s_token: "{{ hostvars['localhost']['k3s_cluster_token'] | default('') }}"
    k3s_server_url: "https://{{ hostvars[groups['k3s_masters'][0]]['ansible_host'] }}:6443"

  tasks:
    - name: Assert k3s cluster token is available.
      ansible.builtin.assert:
        that: k3s_token != ''
        fail_msg: >
          k3s_cluster_token is not set on localhost. This means the first-master
          play was skipped (k3s already installed) and the token was not stored.
          Re-run with: ansible-playbook services/vms/k3s/main.yml -i dist/inventory.json
          --extra-vars "root_playbook_directory=$PWD" --tags token
          Or manually set: hostvars['localhost']['k3s_cluster_token']

    - name: Install k3s on additional masters.  # noqa: command-instead-of-module risky-shell-pipe
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" K3S_TOKEN="{{ k3s_token }}" sh -s - server \
          --server {{ k3s_server_url }} \
          {{ k3s_install_options | join(' ') }} \
          --tls-san {{ ansible_host }}
      args:
        creates: /usr/local/bin/k3s
      register: k3s_install_result
      changed_when: k3s_install_result.rc == 0 and k3s_install_result.stdout != ''

    - name: Wait for k3s to be ready (additional master).
      ansible.builtin.wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        state: present
        timeout: 120

# Install k3s on worker nodes
- name: Install k3s on worker nodes.
  hosts: k3s_nodes
  become: true
  serial: 2
  vars_files:
    - "{{ playbook_dir }}/vars/main.yml"
  vars:
    k3s_version: "{{ k3s_version | default(common.k3s.version) }}"
    k3s_token: "{{ hostvars['localhost']['k3s_cluster_token'] | default('') }}"
    k3s_server_url: "https://{{ hostvars[groups['k3s_masters'][0]]['ansible_host'] }}:6443"

  tasks:
    - name: Assert k3s cluster token is available.
      ansible.builtin.assert:
        that: k3s_token != ''
        fail_msg: >
          k3s_cluster_token is not set on localhost. The first-master play was
          skipped (k3s already installed) and the token was not stored in this run.
          Re-run the full playbook or check /var/lib/rancher/k3s/server/node-token
          on the first master and store it manually.

    - name: Install k3s agent on worker nodes.  # noqa: command-instead-of-module risky-shell-pipe
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" K3S_TOKEN="{{ k3s_token }}" K3S_URL="{{ k3s_server_url }}" sh -
      args:
        creates: /usr/local/bin/k3s
      register: k3s_agent_install_result
      changed_when: k3s_agent_install_result.rc == 0 and k3s_agent_install_result.stdout != ''

    - name: Wait for k3s agent to be ready.
      ansible.builtin.wait_for:
        path: /var/lib/rancher/k3s/agent/kubelet.kubeconfig
        state: present
        timeout: 120

# Configure k3s cluster
- name: Configure k3s cluster.
  hosts: k3s_masters[0]
  gather_facts: false
  become: true

  tasks:
    - name: Wait for all nodes to be ready.
      ansible.builtin.shell: |
        set -o pipefail
        kubectl get nodes --no-headers | wc -l
      register: node_count
      until: node_count.stdout | int == (groups['k3s_masters'] | length + groups['k3s_nodes'] | length)
      retries: 30
      delay: 10
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    - name: Get worker node names from cluster.
      ansible.builtin.shell: |
        set -o pipefail
        kubectl get nodes --no-headers -o custom-columns=NAME:.metadata.name | grep -v master
      register: worker_node_names
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    - name: Label worker nodes.
      ansible.builtin.shell: |
        kubectl label node {{ item }} node-role.kubernetes.io/worker=worker --overwrite
      loop: "{{ worker_node_names.stdout_lines }}"
      register: label_result
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: "'labeled' in label_result.stdout"

    - name: Display cluster status.
      ansible.builtin.shell: |
        kubectl get nodes -o wide
      register: cluster_status
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    - name: Show cluster status.
      ansible.builtin.debug:
        var: cluster_status.stdout_lines

    - name: Display cluster info.
      ansible.builtin.debug:
        msg:
          - "K3s cluster deployed successfully!"
          - "Masters: {{ groups['k3s_masters'] | length }}"
          - "Workers: {{ groups['k3s_nodes'] | length }}"
          - "Kubeconfig saved to: {{ playbook_dir }}/kubeconfig.yaml"
          - ""
          - "Access cluster:"
          - "  export KUBECONFIG={{ playbook_dir }}/kubeconfig.yaml"
          - "  kubectl get nodes"
          - ""
          - "Next steps:"
          - "  1. Configure storage class (NFS to NAS Volume 4)"
          - "  2. Deploy MetalLB for LoadBalancer services"
          - "  3. Deploy ingress controller (Traefik or nginx)"
          - "  4. Deploy ArgoCD for GitOps"
