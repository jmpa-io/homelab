---
# Deploy NFS Storage Class for K3s
# This playbook configures NFS storage using NAS Volume 4

- name: Configure NFS Storage Class for K3s
  hosts: k3s_masters[0]
  become: true

  vars:
    # Both values come from the dynamic inventory — no vars/main.yml needed here.
    nfs_server_ip: "{{ k8s_services.nfs_storage.server }}"
    nas_name: "{{ hostvars[groups['nas'][0]]['instance_name'] }}"
    # Path comes from the inventory so it stays in sync with NFSStorageConfig.
    nfs_path: "{{ k8s_services.nfs_storage.dynamic.path }}"

  tasks:
    - name: Create NFS storage mount point on Proxmox host.
      ansible.builtin.file:
        path: "/mnt/nfs/{{ nas_name }}{{ nfs_path }}"
        state: directory
        mode: '0755'
      delegate_to: "{{ groups['proxmox_hosts'][0] }}"
      become: true

    - name: Create temporary manifest directory.
      ansible.builtin.file:
        path: /tmp/k3s-manifests
        state: directory
        mode: '0755'

    - name: Template NFS storage class manifest.
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../k8s/nfs-storage-class.yaml.j2"
        dest: /tmp/k3s-manifests/nfs-storage-class.yaml
        mode: '0644'

    - name: Apply NFS storage class.
      ansible.builtin.shell: |
        kubectl apply -f /tmp/k3s-manifests/nfs-storage-class.yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: storage_class_result
      changed_when: "'configured' in storage_class_result.stdout or 'created' in storage_class_result.stdout"

    - name: Wait for NFS provisioner to be ready.
      ansible.builtin.shell: |
        kubectl wait --for=condition=ready pod -l app=nfs-client-provisioner -n nfs-provisioner --timeout=120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: provisioner_ready
      retries: 5
      delay: 10
      until: provisioner_ready.rc == 0
      changed_when: false

    - name: Verify storage class is default.
      ansible.builtin.shell: |
        kubectl get storageclass
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: storage_classes
      changed_when: false

    - name: Display storage class info.
      ansible.builtin.debug:
        msg:
          - "NFS Storage Class configured successfully!"
          - "NAS Server: {{ nfs_server_ip }}"
          - "NFS Path: {{ nfs_path }}"
          - "Storage Class: nfs-storage (default)"
          - ""
          - "Storage Classes:"
          - "{{ storage_classes.stdout_lines }}"
          - ""
          - "Test with:"
          - "  kubectl create -f - <<EOF"
          - "  apiVersion: v1"
          - "  kind: PersistentVolumeClaim"
          - "  metadata:"
          - "    name: test-pvc"
          - "  spec:"
          - "    accessModes:"
          - "      - ReadWriteMany"
          - "    resources:"
          - "      requests:"
          - "        storage: 1Gi"
          - "  EOF"
