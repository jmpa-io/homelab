---
# Deploy NFS Storage Class for K3s
# This playbook configures NFS storage using NAS Volume 4

- name: Configure NFS Storage Class for K3s
  hosts: k3s_masters[0]
  become: true

  vars:
    nas_server: "{{ hostvars[groups['nas'][0]]['ansible_host'] }}"
    nas_name: "{{ hostvars[groups['nas'][0]]['instance_name'] }}"
    nfs_path: "/volume4/k3s-storage"
    storage_class_manifest: "{{ playbook_dir }}/nfs-storage-class.yaml"

  tasks:
    - name: Create NFS storage directory on NAS.
      ansible.builtin.file:
        path: "/mnt/nfs/{{ nas_name }}/volume4/k3s-storage"
        state: directory
        mode: '0755'
      delegate_to: "{{ groups['proxmox_hosts'][0] }}"
      become: true

    - name: Create temporary manifest directory.
      ansible.builtin.file:
        path: /tmp/k3s-manifests
        state: directory
        mode: '0755'

    - name: Template NFS storage class manifest.
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../k8s/nfs-storage-class.yaml"
        dest: /tmp/k3s-manifests/nfs-storage-class.yaml
        mode: '0644'
      vars:
        NFS_SERVER_IP: "{{ nas_server }}"

    - name: Apply NFS storage class.
      ansible.builtin.shell: |
        kubectl apply -f /tmp/k3s-manifests/nfs-storage-class.yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: storage_class_result

    - name: Wait for NFS provisioner to be ready.
      ansible.builtin.shell: |
        kubectl wait --for=condition=ready pod -l app=nfs-client-provisioner -n nfs-provisioner --timeout=120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: provisioner_ready
      retries: 5
      delay: 10
      until: provisioner_ready.rc == 0

    - name: Verify storage class is default.
      ansible.builtin.shell: |
        kubectl get storageclass
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: storage_classes

    - name: Display storage class info.
      ansible.builtin.debug:
        msg:
          - "NFS Storage Class configured successfully!"
          - "NAS Server: {{ nas_server }}"
          - "NFS Path: {{ nfs_path }}"
          - "Storage Class: nfs-storage (default)"
          - ""
          - "Storage Classes:"
          - "{{ storage_classes.stdout_lines }}"
          - ""
          - "Test with:"
          - "  kubectl create -f - <<EOF"
          - "  apiVersion: v1"
          - "  kind: PersistentVolumeClaim"
          - "  metadata:"
          - "    name: test-pvc"
          - "  spec:"
          - "    accessModes:"
          - "      - ReadWriteMany"
          - "    resources:"
          - "      requests:"
          - "        storage: 1Gi"
          - "  EOF"
