---
- name: Setup Loki.
  hosts: proxmox_hosts
  become: true
  vars_files:
    - "{{ root_playbook_directory }}/services/lxc/vars/proxmox-node.yml"
  vars:
    lxc_id: "{{ services.loki.container_id }}"
    lxc_hostname: loki
    lxc_root_password: "{{ ansible_become_pass }}"
    lxc_ip_with_cidr: "{{ services.loki.ipv4_with_cidr }}"
    lxc_tags: [ loki, observability ]

  tasks:
    - name: Create LXC container.
      ansible.builtin.include_role:
        name: "{{ root_playbook_directory }}/roles/create-lxc"
      vars:
        create_lxc__proxmox_node_ip: "{{ proxmox_node_ip }}"
        create_lxc__proxmox_node_name: "{{ proxmox_node_name }}"
        create_lxc__proxmox_node_bridge_ip: "{{ proxmox_node_bridge_ip }}"
        create_lxc__proxmox_node_bridge_name: "{{ proxmox_node_bridge_name }}"
        create_lxc__proxmox_api_ip: "{{ proxmox_api_ip }}"
        create_lxc__proxmox_api_token_secret: "{{ proxmox_api_token_secret }}"
        create_lxc__lxc_vmid: "{{ lxc_vmid }}"
        create_lxc__lxc_hostname: "{{ lxc_hostname }}"
        create_lxc__lxc_root_password: "{{ lxc_root_password }}"
        create_lxc__lxc_subnet: "{{ lxc_ip_with_cidr }}"
        create_lxc__lxc_tags: "{{ lxc_tags }}"

    - name: Copy Loki config.
      ansible.builtin.include_role:
        name: "{{ root_playbook_directory }}/roles/copy-file-to-lxc"
      vars:
        copy_file_to_lxc__proxmox_node_ip: "{{ proxmox_node_ip }}"
        copy_file_to_lxc__lxc_vmid: "{{ lxc_vmid }}"
        copy_file_to_lxc__file_source: etc/loki/loki.yml.j2
        copy_file_to_lxc__file_destination: /etc/loki/loki.yml
        copy_file_to_lxc__copy_to_node_show_difference: true
        copy_file_to_lxc__copy_to_node_no_log: false
        copy_file_to_lxc__copy_to_lxc_no_log: false

    - name: Install Loki.
      ansible.builtin.include_role:
        name: "{{ root_playbook_directory }}/roles/execute-script-in-lxc"
      vars:
        execute_script_in_lxc__proxmox_node_ip: "{{ proxmox_node_ip }}"
        execute_script_in_lxc__lxc_vmid: "{{ lxc_vmid }}"
        execute_script_in_lxc__script_source: tmp/install-loki.sh.j2
        execute_script_in_lxc__script_destination: /tmp/install_loki.sh
        execute_script_in_lxc__copy_to_node_show_difference: false

    - name: Check Loki is running.
      ansible.builtin.command: pct exec {{ lxc_vmid }} -- systemctl is-active --quiet loki.service
      register: loki_service_check
      failed_when: loki_service_check.rc != 0
      changed_when: false
