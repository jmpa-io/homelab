# Prerequisite: namespace/media must exist (created by deploy-media-volumes.yml)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: deluge-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-storage
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deluge
  namespace: media
  labels:
    app: deluge
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: deluge
  template:
    metadata:
      labels:
        app: deluge
    spec:
      containers:
      - name: deluge
        image: lscr.io/linuxserver/deluge:latest
        ports:
        - containerPort: 8112
          name: http
        - containerPort: 58846
          name: daemon
        - containerPort: 58946
          name: torrent-tcp
          protocol: TCP
        - containerPort: 58946
          name: torrent-udp
          protocol: UDP
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Australia/Melbourne"
        - name: DELUGE_LOGLEVEL
          value: "info"
        volumeMounts:
        - name: config
          mountPath: /config
        - name: downloads
          mountPath: /downloads
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: deluge-config
      - name: downloads
        persistentVolumeClaim:
          claimName: media-downloads
---
apiVersion: v1
kind: Service
metadata:
  name: deluge
  namespace: media
  labels:
    app: deluge
spec:
  type: LoadBalancer
  ports:
  - port: 8112
    targetPort: http
    protocol: TCP
    name: http
  - port: 58846
    targetPort: daemon
    protocol: TCP
    name: daemon
  - port: 58946
    targetPort: torrent-tcp
    protocol: TCP
    name: torrent-tcp
  - port: 58946
    targetPort: torrent-udp
    protocol: UDP
    name: torrent-udp
  selector:
    app: deluge
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: deluge
  namespace: media
  labels:
    app: deluge
spec:
  selector:
    matchLabels:
      app: deluge
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
