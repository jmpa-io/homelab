---
# Homepage widgets configuration

# Search providers
- search:
    provider: google
    target: _blank

# Kubernetes cluster info
- kubernetes:
    cluster:
      show: true
      cpu: true
      memory: true
      showLabel: true
      label: "K3s Cluster"
    nodes:
      show: true
      cpu: true
      memory: true
      showLabel: true

# System resources (Homepage pod)
- resources:
    backend: kubernetes
    expanded: true
    cpu: true
    memory: true

# OpenMeteo weather widget
- openmeteo:
    label: Melbourne
    latitude: -37.8136
    longitude: 144.9631
    timezone: Australia/Melbourne
    units: metric
    cache: 5

# Datetime
- datetime:
    text_size: xl
    format:
      dateStyle: long
      timeStyle: short
      hour12: false
