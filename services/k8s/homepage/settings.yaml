---
# Homepage settings configuration

title: JMPA Homelab
favicon: https://raw.githubusercontent.com/jmpa-io/homelab/main/docs/logo.png
theme: dark
color: slate
target: _blank

layout:
  Infrastructure:
    style: row
    columns: 3
  Kubernetes:
    style: row
    columns: 4
  Media Management:
    style: row
    columns: 3
  Media Automation:
    style: row
    columns: 3
  Download Clients:
    style: row
    columns: 2
  Monitoring:
    style: row
    columns: 4
  Automation:
    style: row
    columns: 2

# Quick launch shortcuts
quicklaunch:
  searchDescriptions: true
  hideInternetSearch: false
  hideVisitURL: false

# Header links
headerLinks:
  - label: GitHub
    icon: github
    href: https://github.com/jmpa-io/homelab
  - label: Docs
    icon: book
    href: https://github.com/jmpa-io/homelab/tree/main/docs

# Show stats
showStats: true

# Status style
statusStyle: "dot"

# Hide errors
hideErrors: false

# Language
language: en

# Disable guest mode
disableGuest: false
