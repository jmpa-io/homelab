---
# Homepage Services Configuration
# All services use DNS names (*.jmpa.lab) that resolve via Pi-hole
# DNS records are auto-generated from inventory/main.py

- Basics:
  - Calendar:
      widget:
        type: calendar

  - Daily Dad Joke:
      widget:
        type: customapi
        url: https://icanhazdadjoke.com/
        refreshInterval: 86400000
        method: GET
        headers:
          Accept: application/json
        mappings:
          - field: joke
            label: "Dad says..."
            format: text

  - Uptime Kuma:
      icon: uptime-kuma.svg
      description: Uptime monitoring for all homelab services
      href: http://uptime-kuma.jmpa.lab:3001
      siteMonitor: http://uptime-kuma.jmpa.lab:3001
      widget:
        type: uptimekuma
        url: http://uptime-kuma.jmpa.lab:3001
        slug: homelab

- Homelab:
  - Infrastructure:
    - Proxmox:
        icon: proxmox.svg
        description: Hypervisor running all infrastructure
        href: https://proxmox.jmpa.lab:8006
        siteMonitor: https://proxmox.jmpa.lab:8006
        widget:
          type: proxmox
          url: https://proxmox.jmpa.lab:8006
          username: root@pam
          # password: set via HOMEPAGE_VAR_PROXMOX_PASSWORD

    - Prometheus:
        icon: prometheus.svg
        description: Metrics collection and monitoring
        href: http://prometheus.jmpa.lab:9090
        siteMonitor: http://prometheus.jmpa.lab:9090
        widget:
          type: prometheus
          url: http://prometheus.jmpa.lab:9090

    - Grafana:
        icon: grafana.svg
        description: Metrics visualization and dashboards
        href: http://grafana.jmpa.lab:3000
        siteMonitor: http://grafana.jmpa.lab:3000
        widget:
          type: grafana
          url: http://grafana.jmpa.lab:3000
          username: admin
          # password: set via HOMEPAGE_VAR_GRAFANA_PASSWORD

    - Proxmox Backup Server:
        icon: proxmox.svg
        description: Backup server storing to NAS Volume 3
        href: https://pbs.jmpa.lab:8007
        siteMonitor: https://pbs.jmpa.lab:8007

    - Pi-hole:
        icon: pi-hole.svg
        description: Network-wide ad blocking and DNS
        href: http://pihole.jmpa.lab/admin
        siteMonitor: http://pihole.jmpa.lab/admin
        widget:
          type: pihole
          url: http://pihole.jmpa.lab
          # key: set via HOMEPAGE_VAR_PIHOLE_KEY

    - NAS:
        icon: synology.svg
        description: Network attached storage (Volume 3 for backups)
        href: http://nas.jmpa.lab:5000
        siteMonitor: http://nas.jmpa.lab:5000

    - AWS:
        icon: aws.svg
        description: Cloud provider for secrets and DNS
        href: https://console.aws.amazon.com
        ping: https://aws.amazon.com

  - Internet:
    - MySpeed:
        icon: myspeed.svg
        description: The speed of my internet.
        href: https://myspeed.jmpa.io
        siteMonitor: https://myspeed.jmpa.io
        widget:
          type: myspeed
          url: https://myspeed.jmpa.io

    - Speedtest:
        icon: librespeed.svg
        description: Local network speed testing
        href: http://speedtest.jmpa.lab
        siteMonitor: http://speedtest.jmpa.lab

    - Tailscale:
        icon: tailscale.svg
        description: My VPN.
        href: https://tailscale.com
        siteMonitor: https://tailscale.com
        widget:
          type: tailscale

  - AI & Development:
    - Ollama:
        icon: ollama.svg
        description: Self-hosted AI models
        href: http://ollama.jmpa.lab:11434
        siteMonitor: http://ollama.jmpa.lab:11434

    - n8n:
        icon: n8n.svg
        description: Workflow automation platform
        href: http://n8n.jmpa.lab:5678
        siteMonitor: http://n8n.jmpa.lab:5678

    - GitHub Runner:
        icon: github.svg
        description: Self-hosted CI/CD runner
        href: https://github.com/settings/actions/runners
        siteMonitor: http://github-runner.jmpa.lab:22

    - VS Code:
        icon: vscode.svg
        description: IDE in the browser
        href: https://code.jmpa.io
        siteMonitor: https://code.jmpa.io

    - GitHub:
        icon: github.svg
        description: GitHub organization
        href: https://github.com/jmpa-io
        siteMonitor: https://github.com/jmpa-io

    - GitHub (Personal):
        icon: github.svg
        description: Personal GitHub
        href: https://github.com/jcleal
        siteMonitor: https://github.com/jcleal

    - Draw.io:
        icon: https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Diagrams.net_Logo.svg/2048px-Diagrams.net_Logo.svg.png
        description: Architecture diagrams
        href: https://app.diagrams.net
        siteMonitor: https://app.diagrams.net

    - Slack:
        icon: slack.svg
        description: Personal Slack workspace
        href: https://jmpa-io.slack.com
        siteMonitor: https://jmpa-io.slack.com

- Personal:
  - Media:
    - Jellyfin:
        icon: jellyfin.svg
        description: Self-hosted media server
        href: http://jellyfin.jmpa.lab:8096
        siteMonitor: http://jellyfin.jmpa.lab:8096
        widget:
          type: jellyfin
          url: http://jellyfin.jmpa.lab:8096
          # key: set via HOMEPAGE_VAR_JELLYFIN_KEY

  - Music:
    - Youtube Music:
        icon: youtube-music.svg
        description: My music.
        href: https://music.youtube.com
        siteMonitor: https://music.youtube.com

    - Spotify:
        icon: spotify.svg
        description: My backup music.
        href: https://open.spotify.com
        siteMonitor: https://open.spotify.com

  - Finances:
    - Pocketsmith:
        icon: https://play-lh.googleusercontent.com/zyMIPDy4MB_sx7lRpNnNayctyaozKj5IFl2fW017CZ1JKTSX>
        description: My finances.
        href: https://pocketsmith.com/dashboard
        siteMonitor: https://pocketsmith.com/

