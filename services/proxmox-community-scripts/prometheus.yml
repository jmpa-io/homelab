---
# Deploy Prometheus using Proxmox VE Community Script
# https://community-scripts.github.io/ProxmoxVE/scripts?id=prometheus

- name: Deploy Prometheus LXC Container
  hosts: proxmox_hosts[0]
  gather_facts: false

  vars:
    prometheus_vmid: "{{ lookup('env', 'PROMETHEUS_VMID') | default('140', true) }}"
    prometheus_hostname: "{{ lookup('env', 'PROMETHEUS_HOSTNAME') | default('prometheus', true) }}"
    prometheus_ram: "{{ lookup('env', 'PROMETHEUS_RAM') | default('4096', true) }}"
    prometheus_disk_size: "{{ lookup('env', 'PROMETHEUS_DISK_SIZE') | default('20', true) }}"
    prometheus_cpu_cores: "{{ lookup('env', 'PROMETHEUS_CPU_CORES') | default('2', true) }}"
    prometheus_bridge: "{{ lookup('env', 'PROMETHEUS_BRIDGE') | default('vmbr0', true) }}"

  tasks:
    - name: Deploy Prometheus using community script
      ansible.builtin.include_role:
        name: "{{ playbook_dir }}/roles/proxmox-community-script"
      vars:
        pcs_proxmox_host: "{{ inventory_hostname }}"
        pcs_script_url: "https://raw.githubusercontent.com/community-scripts/ProxmoxVE/main/ct/prometheus.sh"
        pcs_script_name: "prometheus"
        pcs_container_id: "{{ prometheus_vmid }}"
        pcs_hostname: "{{ prometheus_hostname }}"
        pcs_ram: "{{ prometheus_ram }}"
        pcs_swap: "512"
        pcs_disk_size: "{{ prometheus_disk_size }}"
        pcs_cpu_cores: "{{ prometheus_cpu_cores }}"
        pcs_bridge: "{{ prometheus_bridge }}"
        pcs_privileged: "no"
        pcs_features: "nesting=1"
        pcs_verbose: "yes"

    - name: Wait for Prometheus to be ready
      ansible.builtin.pause:
        seconds: 30

    - name: Display Prometheus access information
      ansible.builtin.debug:
        msg:
          - "Prometheus deployed successfully!"
          - "Container ID: {{ prometheus_vmid }}"
          - "Hostname: {{ prometheus_hostname }}"
          - "Web UI: http://10.0.1.{{ prometheus_vmid | string | regex_replace('^.*(..)$', '\\1') }}:9090"
          - ""
          - "Next steps:"
          - "1. Configure Prometheus to scrape OpenTelemetry collectors"
          - "2. Add Proxmox VE metrics exporters"
          - "3. Configure alerting rules"

- name: Configure Prometheus to scrape OpenTelemetry collectors
  hosts: proxmox_hosts[0]
  gather_facts: false

  vars:
    prometheus_vmid: "{{ lookup('env', 'PROMETHEUS_VMID') | default('140', true) }}"
    prometheus_ip: "10.0.1.{{ prometheus_vmid | string | regex_replace('^.*(..)$', '\\1') }}"

  tasks:
    - name: Create Prometheus configuration from template
      delegate_to: "{{ inventory_hostname }}"
      ansible.builtin.template:
        src: "{{ playbook_dir }}/roles/proxmox-community-script/templates/prometheus-config.yml.j2"
        dest: "/tmp/prometheus-config.yml"
        mode: '0644'

    - name: Copy configuration to Prometheus container
      delegate_to: "{{ inventory_hostname }}"
      ansible.builtin.shell: |
        pct push {{ prometheus_vmid }} /tmp/prometheus-config.yml /etc/prometheus/prometheus.yml
      register: config_result

    - name: Cleanup temporary config file
      delegate_to: "{{ inventory_hostname }}"
      ansible.builtin.file:
        path: /tmp/prometheus-config.yml
        state: absent

    - name: Reload Prometheus configuration
      delegate_to: "{{ inventory_hostname }}"
      ansible.builtin.shell: |
        pct exec {{ prometheus_vmid }} -- systemctl reload prometheus
      register: reload_result

    - name: Wait for Prometheus to reload
      ansible.builtin.pause:
        seconds: 5

    - name: Verify Prometheus targets
      ansible.builtin.uri:
        url: "http://{{ prometheus_ip }}:9090/api/v1/targets"
        method: GET
        return_content: yes
      register: targets_response
      failed_when: false

    - name: Display Prometheus configuration status
      ansible.builtin.debug:
        msg:
          - "Prometheus configured to scrape:"
          - "  - {{ groups['proxmox_hosts'] | length }} Proxmox hosts (OpenTelemetry)"
          - "  - {{ groups['dns'] | default([]) | length }} DNS servers (OpenTelemetry)"
          - "  - Prometheus self-monitoring"
          - ""
          - "Access Prometheus: http://{{ prometheus_ip }}:9090"
          - "View targets: http://{{ prometheus_ip }}:9090/targets"
