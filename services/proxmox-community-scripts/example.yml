---
# Example playbook for deploying services using Proxmox VE community scripts
# Usage: ansible-playbook services/proxmox-community-scripts/example.yml

- name: Deploy Home Assistant using community script
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Deploy Home Assistant LXC
      include_role:
        name: proxmox-community-script
      vars:
        pcs_proxmox_host: "{{ groups['proxmox_hosts'][0] }}"
        pcs_script_url: "https://github.com/community-scripts/ProxmoxVE/raw/main/ct/homeassistant.sh"
        pcs_script_name: "homeassistant"
        pcs_container_id: "100"
        pcs_hostname: "homeassistant"
        pcs_ram: "4096"
        pcs_disk_size: "16"
        pcs_cpu_cores: "4"
        pcs_features: "nesting=1"

- name: Deploy Pi-hole using community script
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Deploy Pi-hole LXC
      include_role:
        name: proxmox-community-script
      vars:
        pcs_proxmox_host: "{{ groups['proxmox_hosts'][1] }}"
        pcs_script_url: "https://github.com/community-scripts/ProxmoxVE/raw/main/ct/pihole.sh"
        pcs_script_name: "pihole"
        pcs_container_id: "101"
        pcs_hostname: "pihole"
        pcs_ram: "1024"
        pcs_disk_size: "4"
        pcs_cpu_cores: "2"

- name: Deploy Docker host using community script
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Deploy Docker LXC
      include_role:
        name: proxmox-community-script
      vars:
        pcs_proxmox_host: "{{ groups['proxmox_hosts'][2] }}"
        pcs_script_url: "https://github.com/community-scripts/ProxmoxVE/raw/main/ct/docker.sh"
        pcs_script_name: "docker"
        pcs_container_id: "102"
        pcs_hostname: "docker-host"
        pcs_ram: "8192"
        pcs_disk_size: "100"
        pcs_cpu_cores: "8"
        pcs_privileged: "yes"
        pcs_features: "nesting=1,keyctl=1"
        pcs_advanced_options: |
          export DOCKER_COMPOSE_VERSION="2.24.0"
          export PORTAINER="yes"
