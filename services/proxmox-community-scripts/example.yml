---
# Example playbook for deploying services using Proxmox VE community scripts
# Usage: ansible-playbook services/proxmox-community-scripts/example.yml

- name: Deploy Home Assistant using community script
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Deploy Home Assistant LXC
      include_role:
        name: proxmox-community-script
      vars:
        proxmox_host: "{{ groups['proxmox_hosts'][0] }}"
        script_url: "https://github.com/community-scripts/ProxmoxVE/raw/main/ct/homeassistant.sh"
        script_name: "homeassistant"
        container_id: "100"
        hostname: "homeassistant"
        ram: "4096"
        disk_size: "16"
        cpu_cores: "4"
        features: "nesting=1"

- name: Deploy Pi-hole using community script
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Deploy Pi-hole LXC
      include_role:
        name: proxmox-community-script
      vars:
        proxmox_host: "{{ groups['proxmox_hosts'][1] }}"
        script_url: "https://github.com/community-scripts/ProxmoxVE/raw/main/ct/pihole.sh"
        script_name: "pihole"
        container_id: "101"
        hostname: "pihole"
        ram: "1024"
        disk_size: "4"
        cpu_cores: "2"

- name: Deploy Docker host using community script
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Deploy Docker LXC
      include_role:
        name: proxmox-community-script
      vars:
        proxmox_host: "{{ groups['proxmox_hosts'][2] }}"
        script_url: "https://github.com/community-scripts/ProxmoxVE/raw/main/ct/docker.sh"
        script_name: "docker"
        container_id: "102"
        hostname: "docker-host"
        ram: "8192"
        disk_size: "100"
        cpu_cores: "8"
        privileged: "yes"
        features: "nesting=1,keyctl=1"
        advanced_options: |
          export DOCKER_COMPOSE_VERSION="2.24.0"
          export PORTAINER="yes"
