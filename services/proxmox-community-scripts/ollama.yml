---
# Deploy Ollama using Proxmox VE Community Script
# https://community-scripts.github.io/ProxmoxVE/scripts?id=ollama

- name: Deploy Ollama LXC Container
  hosts: proxmox_hosts[0]
  gather_facts: false

  vars:
    ollama_vmid: "{{ lookup('env', 'OLLAMA_VMID') | default('150', true) }}"
    ollama_hostname: "{{ lookup('env', 'OLLAMA_HOSTNAME') | default('ollama', true) }}"
    ollama_ram: "{{ lookup('env', 'OLLAMA_RAM') | default('8192', true) }}"
    ollama_disk_size: "{{ lookup('env', 'OLLAMA_DISK_SIZE') | default('50', true) }}"
    ollama_cpu_cores: "{{ lookup('env', 'OLLAMA_CPU_CORES') | default('4', true) }}"
    ollama_bridge: "{{ lookup('env', 'OLLAMA_BRIDGE') | default('vmbr0', true) }}"
    ollama_ip: "10.0.1.{{ ollama_vmid | string | regex_replace('^.*(..)$', '\\1') }}"

  tasks:
    - name: Deploy Ollama using community script
      ansible.builtin.include_role:
        name: "{{ playbook_dir }}/roles/proxmox-community-script"
      vars:
        pcs_proxmox_host: "{{ inventory_hostname }}"
        pcs_script_url: "https://raw.githubusercontent.com/community-scripts/ProxmoxVE/main/ct/ollama.sh"
        pcs_script_name: "ollama"
        pcs_container_id: "{{ ollama_vmid }}"
        pcs_hostname: "{{ ollama_hostname }}"
        pcs_ram: "{{ ollama_ram }}"
        pcs_swap: "512"
        pcs_disk_size: "{{ ollama_disk_size }}"
        pcs_cpu_cores: "{{ ollama_cpu_cores }}"
        pcs_bridge: "{{ ollama_bridge }}"
        pcs_privileged: "no"
        pcs_features: "nesting=1"
        pcs_verbose: "yes"

    - name: Display Ollama access information
      ansible.builtin.debug:
        msg:
          - "Ollama deployed successfully!"
          - "Container ID: {{ ollama_vmid }}"
          - "Hostname: {{ ollama_hostname }}"
          - "Access: pct enter {{ ollama_vmid }}"
          - "API: http://{{ ollama_ip }}:11434"
          - ""
          - "Test with: curl http://{{ ollama_ip }}:11434/api/generate -d '{\"model\":\"llama2\",\"prompt\":\"Why is the sky blue?\"}'"
