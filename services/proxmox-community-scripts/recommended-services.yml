          - ""
          - "=== DEPLOYMENT COMMAND ==="
          - "ansible-playbook services/proxmox-community-scripts/<service>.yml -i inventory.json"

# Example deployment playbooks for recommended services

- name: Deploy Uptime Kuma
  hosts: proxmox_hosts[0]
  gather_facts: false
  vars:
    service_vmid: "155"
    service_hostname: "uptime-kuma"
  tasks:
    - name: Deploy Uptime Kuma
      ansible.builtin.include_role:
        name: "{{ root_playbook_directory }}/roles/proxmox-community-script"
      vars:
        pcs_script_url: "https://raw.githubusercontent.com/community-scripts/ProxmoxVE/main/ct/uptime-kuma.sh"
        pcs_script_name: "uptime-kuma"
        pcs_container_id: "{{ service_vmid }}"
        pcs_hostname: "{{ service_hostname }}"
        pcs_ram: "1024"
        pcs_disk_size: "4"
        pcs_cpu_cores: "1"
        pcs_bridge: "vmbr0"

- name: Deploy Ntfy
  hosts: proxmox_hosts[0]
  gather_facts: false
  vars:
    service_vmid: "160"
    service_hostname: "ntfy"
  tasks:
    - name: Deploy Ntfy
      ansible.builtin.include_role:
        name: "{{ root_playbook_directory }}/roles/proxmox-community-script"
      vars:
        pcs_script_url: "https://raw.githubusercontent.com/community-scripts/ProxmoxVE/main/ct/ntfy.sh"
        pcs_script_name: "ntfy"
        pcs_container_id: "{{ service_vmid }}"
        pcs_hostname: "{{ service_hostname }}"
        pcs_ram: "512"
        pcs_disk_size: "2"
        pcs_cpu_cores: "1"
        pcs_bridge: "vmbr0"

- name: Deploy Nginx Proxy Manager
  hosts: proxmox_hosts[0]
  gather_facts: false
  vars:
    service_vmid: "170"
    service_hostname: "npm"
  tasks:
    - name: Deploy Nginx Proxy Manager
      ansible.builtin.include_role:
        name: "{{ root_playbook_directory }}/roles/proxmox-community-script"
      vars:
        pcs_script_url: "https://raw.githubusercontent.com/community-scripts/ProxmoxVE/main/ct/nginxproxymanager.sh"
        pcs_script_name: "nginx-proxy-manager"
        pcs_container_id: "{{ service_vmid }}"
        pcs_hostname: "{{ service_hostname }}"
        pcs_ram: "2048"
        pcs_disk_size: "8"
        pcs_cpu_cores: "2"
        pcs_bridge: "vmbr0"
