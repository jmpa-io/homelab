---
# Recommended Proxmox Community Scripts for Homelab

- name: Deploy Monitoring Stack
  hosts: proxmox_hosts[0]
  gather_facts: false

  tasks:
    - name: Display recommended community scripts
      ansible.builtin.debug:
        msg:
          - "=== MONITORING & OBSERVABILITY ==="
          - "✅ Prometheus (VMID 140) - Metrics collection"
          - "✅ Grafana (VMID 145) - Visualization"
          - "✅ Proxmox Backup Server (VMID 100) - Backups"
          - ""
          - "=== AI & DEVELOPMENT ==="
          - "✅ Ollama (VMID 150) - Self-hosted AI"
          - "✅ GitHub Runner (VMID 180+) - CI/CD"
          - ""
          - "=== RECOMMENDED ADDITIONS ==="
          - "📊 Uptime Kuma (VMID 155) - Uptime monitoring"
          - "   Script: https://community-scripts.github.io/ProxmoxVE/scripts?id=uptime-kuma"
          - ""
          - "🔔 Ntfy (VMID 160) - Notification service"
          - "   Script: https://community-scripts.github.io/ProxmoxVE/scripts?id=ntfy"
          - ""
          - "📝 Paperless-ngx (VMID 165) - Document management"
          - "   Script: https://community-scripts.github.io/ProxmoxVE/scripts?id=paperless-ngx"
          - ""
          - "🌐 Nginx Proxy Manager (VMID 170) - Reverse proxy with UI"
          - "   Script: https://community-scripts.github.io/ProxmoxVE/scripts?id=nginxproxymanager"
          - ""
          - "🔐 Vaultwarden (VMID 175) - Password manager"
          - "   Script: https://community-scripts.github.io/ProxmoxVE/scripts?id=vaultwarden"
          - ""
          - "📚 Jellyfin (VMID 185) - Media server"
          - "   Script: https://community-scripts.github.io/ProxmoxVE/scripts?id=jellyfin"
          - ""
          - "🏠 Home Assistant (VMID 190) - Home automation"
          - "   Script: https://community-scripts.github.io/ProxmoxVE/scripts?id=homeassistant"
          - ""
          - "=== INFRASTRUCTURE ==="
          - "🔧 Portainer (VMID 195) - Docker management"
          - "   Script: https://community-scripts.github.io/ProxmoxVE/scripts?id=portainer"
          - ""
          - "📊 Netdata (VMID 200) - Real-time monitoring"
          - "   Script: https://community-scripts.github.io/ProxmoxVE/scripts?id=netdata"
